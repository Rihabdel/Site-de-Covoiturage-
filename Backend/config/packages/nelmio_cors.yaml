nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin:
            ["http://localhost:5173", "https://ecoride-front.onrender.com"]
        allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
        allow_headers: ["Content-Type", "Authorization", "X-AUTH-TOKEN"]
        expose_headers: ["Link"]
        max_age: 3600
    paths:
        "^/api/":
            allow_origin:
                ["http://localhost:5173", "https://ecoride-front.onrender.com"]
            allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
            allow_headers: ["Content-Type", "Authorization", "X-AUTH-TOKEN"]
            expose_headers: ["Link"]
            max_age: 3600
