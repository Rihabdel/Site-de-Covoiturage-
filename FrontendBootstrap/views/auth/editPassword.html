<div class="form-container" >
    <div class="form-header">
        <h2 class="text-center mb-4">Changement de mot de passe</h2>
    </div>
    <form>
        <div class="mb-3">
            <label for="PasswordInput" class="form-label">Ancien mot de passe</label>
            <input type="password" class="form-control" id="PasswordInput" name="Password">
        </div>
        <div class="mb-3">
            <label for="NewPasswordInput" class="form-label">Nouveau mot de passe</label>
            <input type="password" class="form-control" id="NewPasswordInput" name="NewPassword">
        </div>
        <div class="mb-3">
            <label for="ValidatePasswordInput" class="form-label">Validez votre nouveau mot de passe</label>
            <input type="password" class="form-control" id="ValidatePasswordInput" name="PasswordConfirm">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Changer mon mot de passe</button>
        </div>
    </form>
    <div class="text-center pt-3">
        <a href="/monCompte">Modifier mes informations personnelles</a>
    </div>
</div>
