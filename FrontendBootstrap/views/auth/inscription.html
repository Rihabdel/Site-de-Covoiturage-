<div class="form-container mt-5 mb-5" >
    <div class="form-header">
                    <h2>Inscription</h2>
                    <p>Créez votre compte EcoRide</p>
                </div>
    <form id="InscriptionForm" action="" method="POST">
        <div class="mb-3">
            <label for="PseudoInput" class="form-label">Pseudo</label>
            <input type="text" class="form-control" id="PseudoInput" placeholder="Votre pseudo" name="username"> 
        </div>    
        <div class="mb-3">
          <label for="EmailInput" class="form-label">Email</label>
          <input type="email" class="form-control" id="EmailInput" placeholder="test@mail.fr" name="email"> 
        </div>
        <div class="mb-3">
          <label for="PasswordInput" class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="PasswordInput" name="password">
          <small class="form-text text-muted">Le mot de passe doit contenir au moins 10 caractères constitué au minima d'un caractère spécial, une majuscule, une minuscule, un chiffre</small>
        </div>
        <div class="mb-3">
            <label for="ValidatePasswordInput" class="form-label">Validez votre mot de passe</label>
            <input type="password" class="form-control" id="ValidatePasswordInput" name="passwordConfirm">
          </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary" id="btnSubmitInscription">Inscription</button>
        </div>
    </form>
    <div class="text-center pt-3">
        <a href="/connexion">Vous avez déjà un compte ? Connectez-vous ici !</a>
    </div>

</div>
