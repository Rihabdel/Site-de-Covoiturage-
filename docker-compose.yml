version: "3.8"

services:

  api:
    build: ./Backend
    container_name: Ecoride_symfony_back
    ports:
      - "8000:80"
    volumes:
      - ./Backend:/var/www/html
      - symfony_var:/var/www/html/var
      - symfony_vendor:/var/www/html/vendor
    depends_on:
      - database

  database:
    image: mysql:8
    container_name: ecoride_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecoride_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ecoride_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
    depends_on:
      - database

volumes:
  symfony_var:
  symfony_vendor:
  db_data: